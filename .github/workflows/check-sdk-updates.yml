name: Check SDK updates
on:
  schedule:
    - cron: "14 23 * * *"
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  check:
    name: Check SDK updates
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v5

      - name: Checkout AWS SDK Go v2
        run: |
          git clone --depth=1 https://github.com/aws/aws-sdk-go-v2.git

      - name: Check SDK updates
        id: check-sdk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_SDK_GO_V2_DIR: ./aws-sdk-go-v2
        run: |
          set +e
          make all-services.yaml
          git diff --exit-code all-services.yaml
          if [[ $? -eq 0 ]]; then
            echo "No changes detected"
            exit 0
          fi
          echo "updated=true" >> "$GITHUB_OUTPUT"

          # Extract added/removed services from the diff
          ADDED=$(git diff all-services.yaml | grep '^+  ' | sed 's/^+  //' | sed 's/:$//' | sort)
          REMOVED=$(git diff all-services.yaml | grep '^-  ' | sed 's/^-  //' | sed 's/:$//' | sort)

          # Build PR title
          ADDED_INLINE=$(echo "$ADDED" | tr '\n' ', ' | sed 's/,$//' | sed 's/,/, /g')
          REMOVED_INLINE=$(echo "$REMOVED" | tr '\n' ', ' | sed 's/,$//' | sed 's/,/, /g')
          if [[ -n "$ADDED" && -n "$REMOVED" ]]; then
            PR_TITLE="Add ${ADDED_INLINE}; Remove ${REMOVED_INLINE} in all-services.yaml"
          elif [[ -n "$ADDED" ]]; then
            PR_TITLE="Add ${ADDED_INLINE} to all-services.yaml"
          elif [[ -n "$REMOVED" ]]; then
            PR_TITLE="Remove ${REMOVED_INLINE} from all-services.yaml"
          else
            PR_TITLE="Update all-services.yaml"
          fi

          # Build PR body
          PR_BODY=""
          if [[ -n "$ADDED" ]]; then
            PR_BODY+="## Added"$'\n'
            while IFS= read -r svc; do
              PR_BODY+="- ${svc}"$'\n'
            done <<< "$ADDED"
            PR_BODY+=$'\n'
          fi
          if [[ -n "$REMOVED" ]]; then
            PR_BODY+="## Removed"$'\n'
            while IFS= read -r svc; do
              PR_BODY+="- ${svc}"$'\n'
            done <<< "$REMOVED"
          fi
          if [[ -z "$PR_BODY" ]]; then
            PR_BODY="Update all-services.yaml"
          fi

          BRANCH_NAME="update-aws-sdk-go-v2-$(date +%Y%m%d-%H%M%S)"
          git switch -c "${BRANCH_NAME}"
          git add all-services.yaml
          git config --global user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global user.name "${GITHUB_ACTOR}"
          git commit -m "${PR_TITLE}"
          git push --set-upstream origin "${BRANCH_NAME}"
          gh pr create --title "${PR_TITLE}" --body "${PR_BODY}" --base main
      - name: make all services
        if: ${{ steps.check-sdk.outputs.updated == 'true' }}
        run: |
          cp all-services.yaml gen.yaml
          make
